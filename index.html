<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>百鬼夜行 HYAKKI YAGYO — 夜明けまで生き延びろ</title>
  <meta name="description" content="陰陽師となり、百鬼夜行の夜を夜明けまで生き延びるサバイバーアクション。ブラウザで無料プレイ。" />
  <style>
    :root { --ink:#0b0b12; --paper:#e8e2d0; --lantern:#e8a33d; --spirit:#5fd3c4; }
    * { margin:0; box-sizing:border-box; }
    body { background:var(--ink); color:var(--paper); font-family:'Segoe UI', 'Hiragino Sans', 'Yu Gothic', sans-serif;
           min-height:100vh; display:flex; align-items:center; justify-content:center; }
    main { text-align:center; padding:2rem; }
    h1 { font-size:3rem; letter-spacing:.3em; color:var(--lantern); }
    p  { margin:1rem 0 2rem; opacity:.8; }
    a.play { display:inline-block; padding:1rem 3rem; border:2px solid var(--lantern); color:var(--lantern);
             text-decoration:none; font-size:1.2rem; letter-spacing:.2em; transition:.2s; }
    a.play:hover { background:var(--lantern); color:var(--ink); }
  </style>
</head>
<body>
  <main>
    <h1>百鬼夜行</h1>
    <p>夜明けまで、生き延びろ。(開発中 — ランディングページはP7で完成)</p>
    <a class="play" href="./play/">今すぐ遊ぶ</a>
  </main>
</body>
</html>
